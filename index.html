<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, Ana! | Help.Debs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8f4ff;
      --card: #ffffff;
      --purple: #6b4fc7;
      --purple-dark: #4a348f;
      --lilac: #efe7ff;
      --text: #2f2942;
      --soft: #7e7597;
      --muted: #aaa0c4;
    }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(255,255,255,.95) 0 3px, transparent 4px),
        radial-gradient(circle at 82% 20%, rgba(107,79,199,.18) 0 5px, transparent 6px),
        radial-gradient(circle at 18% 78%, rgba(107,79,199,.14) 0 4px, transparent 5px),
        linear-gradient(135deg, #fbf8ff 0%, var(--bg) 45%, #f3edff 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .page {
      width: 100%;
      max-width: 520px;
    }

    .card {
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(107,79,199,.11);
      border-radius: 32px;
      box-shadow: 0 22px 60px rgba(76, 51, 145, .14);
      padding: 42px 30px 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "✦";
      position: absolute;
      top: 22px;
      left: 28px;
      color: #b8a6ec;
      font-size: 22px;
    }

    .card::after {
      content: "☾";
      position: absolute;
      top: 18px;
      right: 30px;
      color: #c4b5f1;
      font-size: 28px;
    }

    .brand {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 800;
      color: #927fd1;
      margin-bottom: 26px;
    }

    .portal {
      width: 82px;
      height: 82px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: linear-gradient(145deg, #f7f0ff, #e7dcff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: inset 0 0 0 1px rgba(107,79,199,.10), 0 14px 32px rgba(107,79,199,.14);
      font-size: 36px;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.1rem);
      line-height: 1.05;
      color: var(--purple-dark);
      margin-bottom: 10px;
      letter-spacing: -1.2px;
    }

    .welcome {
      font-size: clamp(1.2rem, 4vw, 1.55rem);
      line-height: 1.35;
      font-weight: 700;
      color: var(--text);
      max-width: 380px;
      margin: 0 auto 28px;
    }

    .divider {
      width: 52px;
      height: 3px;
      border-radius: 999px;
      background: var(--lilac);
      margin: 0 auto 28px;
    }

    .btn {
      display: block;
      width: 100%;
      background: var(--purple);
      color: #fff;
      text-decoration: none;
      border-radius: 18px;
      padding: 18px 22px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: .2px;
      box-shadow: 0 14px 28px rgba(107,79,199,.24);
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .btn:hover {
      background: #5d43b8;
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(107,79,199,.28);
    }

    .notes {
      margin-top: 24px;
      background: #faf7ff;
      border: 1px solid #efe8ff;
      border-radius: 22px;
      padding: 20px;
      text-align: left;
    }

    .notes-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.4px;
      color: #a191d0;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .note {
      display: flex;
      gap: 10px;
      color: var(--soft);
      font-size: .95rem;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .note:last-child { margin-bottom: 0; }

    .icon {
      flex: 0 0 auto;
      color: var(--purple);
    }

    .footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: .82rem;
    }

    @media (max-width: 420px) {
      .card { padding: 36px 22px 24px; border-radius: 26px; }
      .portal { width: 74px; height: 74px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-label="Página de boas-vindas para aula experimental">
      <div class="brand">help.debs</div>

      <div class="portal" aria-hidden="true">✨</div>

      <h1>Hello, Ana!</h1>
      <p class="welcome">Seja bem-vinda ao seu novo mundo!</p>

      <div class="divider"></div>

      <a class="btn" href="https://elos.vc/sala/teacherdebora" target="_blank" rel="noopener noreferrer">
        Entrar na aula online
      </a>

      <div class="notes">
        <div class="notes-title">Notes</div>

        <div class="note">
          <span class="icon">•</span>
          <span>Entre como convidada com seu nome e um e-mail.</span>
        </div>

        <div class="note">
          <span class="icon">•</span>
          <span>Para melhorar sua experiência, recomenda-se o uso de fones de ouvido com microfone.</span>
        </div>
      </div>

      <div class="footer">help.debs · aula experimental</div>
    </section>
  </main>
</body>
</html>
